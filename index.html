<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/estilo.css">
    <script src="https://kit.fontawesome.com/cdf86462f5.js" crossorigin="anonymous"></script>
    <title>Seu Cronometro</title>
</head>
<body>
    <main id="container">
        <h1>Cronometro</h1>
        <p id="relogio">00:00:00</p>
        <p class="botao">
            <button id="inicia"><i class="fa-solid fa-play"></i></button>
            <button id="para"><i class="fa-solid fa-pause"></i></button>
            <button id="zera"><i class="fa-solid fa-stop"></i></button>
        </p>
    </main>
    <script src="scripts/script.js"></script>
</body>
</html>
